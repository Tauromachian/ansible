- name: Download and install Ghostty GPG key (dearmored)
  become: true
  shell: |
    curl -sS https://debian.griffo.io/EA0F721D231FDD3A0A17B9AC7808B4DD62C41256.asc | sudo gpg --dearmor --yes -o /etc/apt/trusted.gpg.d/debian.griffo.io.gpg
  register: gpg_key_result
  changed_when: gpg_key_result.rc == 0

- name: Add repository
  become: true
  shell: |
    echo "deb https://debian.griffo.io/apt trixie main" | sudo tee /etc/apt/sources.list.d/debian.griffo.io.list


- name: Update cache
  become: true
  apt:
    update_cache: yes

- name: Install Ghostty
  become: true
  ansible.builtin.apt:
    name:
      - ghostty
